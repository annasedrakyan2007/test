<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

    <form id = "transactioninfo">
        <p>
            <label for="userid">User ID:</label><br>
            <input type="text" id="userid" name="userid"><br>

        <p>
            <label for="amount">Amount:</label><br>
            <input type="text" id="amount" name="amount"><br>
        </p>

        <p>
            <input type="radio" id="deposit" name="typeoftransaction" value="deposit">
            <label for="html">Deposit</label><br>
            <input type="radio" id="withdraw" name="typeoftransaction" value="withdraw">
            <label for="css">Withdraw</label><br>
        </p>
        <p>
            <input type="submit" value="Submit">
        </p>
    </form>

    <script src = "main.js"></script>

</body>
</html>
